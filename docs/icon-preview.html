<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Icon Preview</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; padding: 40px; }
  h1 { margin-bottom: 10px; }
  .desc { color: #888; font-size: 13px; margin-bottom: 30px; }
  .row { display: flex; gap: 60px; margin-bottom: 40px; align-items: flex-start; }
  .set { text-align: center; }
  .set h3 { margin: 8px 0 16px; font-size: 14px; color: #aaa; }
  .icons { display: flex; gap: 24px; align-items: center; }
  .icon-box { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .icon-box span { font-size: 11px; color: #888; }
  .s16 svg { width: 16px; height: 16px; }
  .s20 svg { width: 20px; height: 20px; }
  .note { font-size: 12px; color: #888; margin-top: 8px; max-width: 220px; }
</style>
</head>
<body>
<h1>筛选图标方案预览</h1>
<p class="desc">圆角弯头 + 实心箭头 + 横7竖3 同比例（引入引出比例一致，方向区分）</p>

<!-- ===== Set 1: 标尺固定 + 弯头在上方 ===== -->
<div class="row">
  <div class="set"><h3>方案 A：标尺固定 + 上方 ┐ / ┌</h3>
    <div class="icons">
      <!-- 全部：标尺 + 上方 ALL -->
      <div class="icon-box s20">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke="#666">
          <rect x="1" y="12" width="22" height="7" rx="2"/>
          <line x1="5" y1="12" x2="5" y2="16"/>
          <line x1="9" y1="12" x2="9" y2="18"/>
          <line x1="13" y1="12" x2="13" y2="16"/>
          <line x1="17" y1="12" x2="17" y2="18"/>
          <line x1="21" y1="12" x2="21" y2="16"/>
          <text x="12" y="8" text-anchor="middle" fill="#666" stroke="none" font-size="8" font-family="sans-serif" font-weight="700">ALL</text>
        </svg>
        <span>全部</span>
      </div>
      <!-- 已添加：圆角 ┐ 横7竖3 实心箭头朝下 -->
      <div class="icon-box s20">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke="#6c63ff">
          <rect x="1" y="12" width="22" height="7" rx="2"/>
          <line x1="5" y1="12" x2="5" y2="16"/>
          <line x1="9" y1="12" x2="9" y2="18"/>
          <line x1="13" y1="12" x2="13" y2="16"/>
          <line x1="17" y1="12" x2="17" y2="18"/>
          <line x1="21" y1="12" x2="21" y2="16"/>
          <!-- 横7竖3 圆角 ┐ -->
          <path d="M 2,4 H 9 A 2,2 0 0,1 11,6 V 9"/>
          <polygon points="9,7 11,11 13,7" fill="#6c63ff" stroke="none"/>
        </svg>
        <span>已添加</span>
      </div>
      <!-- 未添加：圆角 ┌ 横7竖3 实心箭头朝右 -->
      <div class="icon-box s20">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke="#6c63ff">
          <rect x="1" y="12" width="22" height="7" rx="2"/>
          <line x1="5" y1="12" x2="5" y2="16"/>
          <line x1="9" y1="12" x2="9" y2="18"/>
          <line x1="13" y1="12" x2="13" y2="16"/>
          <line x1="17" y1="12" x2="17" y2="18"/>
          <line x1="21" y1="12" x2="21" y2="16"/>
          <!-- 横7竖3 圆角 ┌ -->
          <path d="M 12,10 V 7 A 2,2 0 0,1 14,5 H 21"/>
          <polygon points="20,3 23,5 20,7" fill="#6c63ff" stroke="none"/>
        </svg>
        <span>未添加</span>
      </div>
    </div>
    <p class="note">已添加：横7竖3 ┐ 箭头朝下；未添加：横7竖3 ┌ 箭头朝右；全部：标尺+ALL</p>
  </div>
</div>
