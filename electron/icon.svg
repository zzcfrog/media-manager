<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c8cff"/>
      <stop offset="100%" stop-color="#4a6cf7"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bg)"/>
  <!-- Film strip holes left -->
  <rect x="68" y="100" width="24" height="36" rx="6" fill="#2a2a4a"/>
  <rect x="68" y="164" width="24" height="36" rx="6" fill="#2a2a4a"/>
  <rect x="68" y="228" width="24" height="36" rx="6" fill="#2a2a4a"/>
  <rect x="68" y="292" width="24" height="36" rx="6" fill="#2a2a4a"/>
  <rect x="68" y="356" width="24" height="36" rx="6" fill="#2a2a4a"/>
  <!-- Film strip holes right -->
  <rect x="420" y="100" width="24" height="36" rx="6" fill="#2a2a4a"/>
  <rect x="420" y="164" width="24" height="36" rx="6" fill="#2a2a4a"/>
  <rect x="420" y="228" width="24" height="36" rx="6" fill="#2a2a4a"/>
  <rect x="420" y="292" width="24" height="36" rx="6" fill="#2a2a4a"/>
  <rect x="420" y="356" width="24" height="36" rx="6" fill="#2a2a4a"/>
  <!-- Grid: 2x2 thumbnails -->
  <rect x="118" y="100" width="132" height="100" rx="12" fill="#252545"/>
  <rect x="262" y="100" width="132" height="100" rx="12" fill="#252545"/>
  <rect x="118" y="216" width="132" height="100" rx="12" fill="#252545"/>
  <rect x="262" y="216" width="132" height="100" rx="12" fill="#252545"/>
  <!-- Thumbnail content gradients -->
  <rect x="118" y="100" width="132" height="100" rx="12" fill="#3a3a5a" opacity="0.6"/>
  <rect x="262" y="100" width="132" height="100" rx="12" fill="#2a3a5a" opacity="0.6"/>
  <rect x="118" y="216" width="132" height="100" rx="12" fill="#2a3a5a" opacity="0.6"/>
  <rect x="262" y="216" width="132" height="100" rx="12" fill="#3a3a5a" opacity="0.6"/>
  <!-- Play button overlay on top-left thumbnail -->
  <polygon points="172,138 172,168 196,153" fill="#6c8cff" opacity="0.7"/>
  <!-- Play button overlay on bottom-right thumbnail -->
  <polygon points="316,254 316,284 340,269" fill="#6c8cff" opacity="0.7"/>
  <!-- Mountain on top-right thumbnail -->
  <polygon points="274,186 310,150 346,186" fill="#4a5a7a" opacity="0.5"/>
  <polygon points="310,150 330,170 340,186" fill="#5a6a8a" opacity="0.5"/>
  <!-- Star on bottom-left -->
  <text x="184" y="272" font-size="18" fill="#fdd835" opacity="0.6" text-anchor="middle" font-family="sans-serif">★</text>
  <!-- Center play circle -->
  <circle cx="256" cy="356" r="48" fill="url(#accent)" opacity="0.9"/>
  <polygon points="244,336 244,376 276,356" fill="#fff"/>
</svg>
